<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasil Kelulusan</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="hasil-page">

<div class="card-hasil" id="cardHasil">
    <img src="logo_sekolah.png" alt="Logo Sekolah" class="logo-hasil">
    <h2>HASIL KELULUSAN</h2>
    <img id="fotoSiswa" class="foto-siswa" alt="Foto Siswa">
    <p id="nama"></p>
    <p id="nisn"></p>

    <div class="nilai-box">
        <h3>Nilai Siswa</h3>
        <ul id="daftarNilai"></ul>
        <p id="rataRata"></p>
    </div>

    <h3 id="status" class="status"></h3>
    <button onclick="window.location.href='index.html'">Kembali</button>
</div>

<script>
(function tampilkanHasil() {
    const raw = sessionStorage.getItem("hasil_kelulusan");

    if (!raw) {
        alert("Data hasil tidak ditemukan. Silakan cek kelulusan dari halaman utama.");
        window.location.href = "index.html";
        return;
    }

    const siswa = JSON.parse(raw);

    document.getElementById("nama").textContent = `Nama: ${siswa.nama}`;
    document.getElementById("nisn").textContent = `NISN: ${siswa.nisn}`;
    document.getElementById("fotoSiswa").src = siswa.foto || "https://via.placeholder.com/120x150?text=Foto";

    const daftarNilai = document.getElementById("daftarNilai");
    daftarNilai.innerHTML = "";

    const nilaiObj = siswa.nilai || {};
    const mapel = Object.keys(nilaiObj);

    if (mapel.length === 0) {
        const li = document.createElement("li");
        li.textContent = "Nilai belum tersedia";
        daftarNilai.appendChild(li);
        document.getElementById("rataRata").textContent = "Rata-rata: -";
    } else {
        const total = mapel.reduce((sum, key) => {
            const nilai = Number(nilaiObj[key]) || 0;
            const li = document.createElement("li");
            li.textContent = `${key}: ${nilai}`;
            daftarNilai.appendChild(li);
            return sum + nilai;
        }, 0);

        const rata = (total / mapel.length).toFixed(2);
        document.getElementById("rataRata").textContent = `Rata-rata: ${rata}`;
    }

    const statusEl = document.getElementById("status");
    if (siswa.status === "LULUS") {
        statusEl.textContent = "🎉 SELAMAT, ANDA LULUS!";
        statusEl.classList.add("lulus");
    } else {
        statusEl.textContent = "ANDA TIDAK LULUS";
        statusEl.classList.add("tidak-lulus");
    }
})();
</script>

</body>
</html>
