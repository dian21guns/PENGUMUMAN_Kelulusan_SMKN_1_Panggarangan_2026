<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengumuman Kelulusan SMKN 1 Panggarangan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="body-index">
  <div id="countdownPopup" class="countdown-popup" hidden>
    <div class="popup-heading">PENGUMUMAN KELULUSAN SMKN 1 PANGGARANGAN TAHUN AJARAN 2026-2026</div>
    <div class="countdown-title">Pengumuman Akan Dapat Dibuka Kemudian</div>
    <div id="countdownTimer" class="countdown-timer">--:--:--</div>
  </div>

  <main class="card-index">
    <img src="logo_sekolah.png" alt="Logo Sekolah" class="logo-index" />
    <h1>PENGUMUMAN KELULUSAN<br>SMKN 1 PANGGARANGAN<br>TAHUN AJARAN 2025/2026</h1>
    <div class="line"></div>

    <label for="nisn">Masukkan NISN Anda</label>
    <input id="nisn" type="text" placeholder="Contoh: 0071421202" />

    <label for="tanggalLahir">Masukkan Tanggal Lahir</label>
    <input id="tanggalLahir" type="date" />

    <button id="btnCekKelulusan" type="button" onclick="cekKelulusan()">CEK KELULUSAN</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
